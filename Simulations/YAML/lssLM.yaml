
#### WCU FILES ####


### DETLIN ###

DETLIN_2RG_RAW:
  do.catg: DETLIN_2RG_RAW
  mode: "img_lm"
  source:
    name: flat_field
    kwargs:
      temperature: 200
      amplitude: 0
      filter_curve: "V"
      extend: 15
  properties:
    dit:
      - 1.
    ndit: 1
    filter_name: "open"
    catg: "CALIB"
    tech: "IMAGE,LM"
    type: "DETLIN"
    tplname: "METIS_img_lm_cal_DetLin"
    nObs: 1

### RSRF ###

LM_LSS_RSRF_RAW1:
  do.catg: LM_LSS_RSRF_RAW
  mode: "lss_l"
  source:
    name: flat_field
    kwargs:
      temperature: 5000
      amplitude: 0
      filter_curve: "V"
      extend: 15
  properties:
    dit: 0.25
    ndit: 1
    filter_name: "L_spec"
    catg: "CALIB"
    tech: "LSS,LM"
    type: "FLAT,LAMP"
    tplname: "METIS_spec_lm_cal_rsrf"
    nObs: 1


### RSRF W/ PINHOLE ###

