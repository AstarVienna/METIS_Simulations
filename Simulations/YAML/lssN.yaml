

#### WCU FILES ####

### DETLIN ###

DETLIN_GEO_RAW:
  do.catg: DETLIN_GEO_RAW
  mode: "img_n"
  source:
    name: flat_field
    kwargs:
      temperature: 200
      amplitude: 0
      filter_curve: "V"
      extend: 15
  properties:
    dit:
      - 1.
    ndit: 1
    filter_name: "open"
    catg: "CALIB"
    tech: "IMAGE,N"
    type: "DETLIN"
    tplname: "METIS_img_n_cal_DetLin"
    nObs: 1

### RSRF ###

N_LSS_RSRF_RAW1:
