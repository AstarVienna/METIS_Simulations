#### COMPLETE SET OF RAW INPUT FILES FOR LM BAND RECIPES #####

############# WCU DATA ##############
### DETLIN AND DISTORTION ###########

DETLIN_2RG_RAW:
  do.catg: DETLIN_2RG_RAW
  mode: "img_lm"
  source:
    name: flat_field
    kwargs:
      temperature: 200
      amplitude: 0
      filter_curve: "V"
      extend: 15
  properties:
    dit:
      - 1.
    ndit: 1
    filter_name: "open"
    catg: "CALIB"
    tech: "IMAGE,LM"
    type: "DETLIN"
    tplname: "METIS_img_lm_cal_DetLin"
    nObs: 1

LM_DISTORTION_RAW:
  do.catg: LM_DISTORTION_RAW
  mode: "img_lm"
  source:
    name: pinhole_mask
    kwargs: {}
  properties:
    dit: 0.25
    ndit: 1
    filter_name: "Lp"
    nd_filter_name: "ND_OD3"
    catg: "CALIB"
    tech: "IMAGE,LM"
    type: "DISTORTION"
    tplname: "METIS_img_lm_cal_distortion"
    nObs: 1


