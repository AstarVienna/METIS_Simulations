
##################### IFU RSRF #####################
##PINHOLE TRACES IN VARIOUS TRACES
IFU_RSRF_RAW1:
  do.catg: IFU_RSRF_PINH_RAW
  mode: "wcu_lms"
  source:
    name: empty_sky
    kwargs: {}
  properties:
    dit: 10
    ndit: 20
    wavelen: 3.555
    filter_name: "open"
    ndfilter_name: "open"
    catg: "CALIB"
    tech: "IFU"
    type: "RSRF"
    tplname: "METIS_ifu_cal_rsrf"
    nObs: 1
  wcu:
    current_lamp: "bb"
    current_fpmask: "grid_lms"
    bb_aperture: 0.5
    bb_temp: 800
    is_temp: 300
    wcu_temp: 300
    xshift: 0
    yshift: 0

