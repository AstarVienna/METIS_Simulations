name: Run recipes

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  #schedule:
  #  # Schedule disabled because it uses all of A*V's github data.
  #  - # Run every day at 2:00 UTC
  #  - cron: "0 2 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          git clone https://github.com/AstarVienna/irdb.git
      - name: Run recipes
        run: |
          export MSIM_YAML_DIR="YAML/Tests"
          export MSIM_NCORES=1
          export DEFAULT_IRDB_LOCATION="irdb"
          export MSIM_OUTDIR="."
  
          python simulationBlocks/Tests/ci.py --small
