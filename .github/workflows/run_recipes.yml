name: Run recipes

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  #schedule:
  #  # Schedule disabled because it uses all of A*V's github data.
  #  - # Run every day at 2:00 UTC
  #  - cron: "0 2 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
	  pip install .
          git clone https://github.com/AstarVienna/irdb.git
      - name: Run recipes
        run: |
          export MSIM_YAML_DIR="YAML"
	  export MSIM_NCORES=4
	  export DEFAULT_IRDB_LOCATION="inst_pkgs"
	  export MSIM_OUTDIR="."
	  
          ln -s ../irdb inst_pkgs # symbolic link to git-cloned irdb copy to ensure latest irdb version (vs released version in download_packages)
          sh runESO_small.sh
