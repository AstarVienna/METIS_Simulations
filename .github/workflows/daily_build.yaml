name: Run daily build recipes automatically or manually

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 0 * * *'  # Run on 0:00 UTC 

jobs:
  # Setup job: check if build is needed and prepare environment
  setup:
    runs-on: [self-hosted, Linux, simulation, zeus]
    outputs:
      should_build: ${{ steps.build_check.outputs.should_build }}
      build_reason: ${{ steps.build_check.outputs.build_reason }}
    steps:
      - uses: actions/checkout@v6

      - name: Check LatestBuild freshness and completeness
        id: build_check
        run: |
          SHOULD_BUILD=1
          BUILD_REASON="No previous build found"
          TARGET=""
          REQUIRED_DIRS="Calib hciAppLM hciRavcIfu hciRavcLM ifu imgLM imgN lssLM lssN"

          if [ -L /data/LatestBuild ] || [ -d /data/LatestBuild ]; then
            TARGET=$(readlink -f /data/LatestBuild || true)
            if [ -z "$TARGET" ]; then
              TARGET="/data/LatestBuild"
            fi

            if [ -d "$TARGET" ]; then
              MISSING=0
              for d in $REQUIRED_DIRS; do
                if [ ! -d "$TARGET/$d" ]; then
                  echo "Missing required directory: $TARGET/$d"
                  MISSING=1
                fi
              done

              if [ "$MISSING" -eq 0 ]; then
                NOW_TS=$(date +%s)
                TARGET_TS=$(stat -c %Y "$TARGET")
                AGE_DAYS=$(( (NOW_TS - TARGET_TS) / 86400 ))
                echo "Latest complete build age: ${AGE_DAYS} days"

                if [ "$AGE_DAYS" -lt 7 ]; then
                  SHOULD_BUILD=0
                  BUILD_REASON="Latest complete build is newer than 7 days"
                else
                  BUILD_REASON="Latest complete build is 7+ days old"
                fi
              else
                BUILD_REASON="LatestBuild is incomplete"
              fi
            else
              BUILD_REASON="LatestBuild link target is missing"
            fi
          fi

          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT
          echo "build_reason=$BUILD_REASON" >> $GITHUB_OUTPUT
          echo "Decision: SHOULD_BUILD=$SHOULD_BUILD ($BUILD_REASON)"

  # Main job: run simulation blocks in parallel using matrix strategy
  simulate:
    needs: setup
    if: needs.setup.outputs.should_build == '1'
    runs-on: [self-hosted, Linux, simulation, zeus]
    strategy:
      matrix:
        # Define all simulation blocks to run in parallel
        block: [imgLM, imgN, lssLM, lssN, ifu, calib, hciRavcLM, hciAppLm, hciRavcIfu]
      # Continue running other blocks even if one fails, for better debugging
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - name: Install Python 3.12 on Fedora (if missing)
        run: |
          if ! command -v python3.12 &> /dev/null; then
            sudo dnf install -y python3.12 python3.12-pip
          fi
          python3.12 --version

      - name: Use Python 3.12
        run: |
          python3.12 -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          ln -sf /usr/bin/python3.12 $HOME/python
          echo "$HOME" >> $GITHUB_PATH
          python3.12 -m pip install --upgrade pip
          python3.12 -m pip install -e .
          python3.12 -m pip install git+https://github.com/AstarVienna/ScopeSim_Templates.git
          python3.12 -m pip install git+https://github.com/AstarVienna/ScopeSim_Data.git
          python3.12 -m pip install git+https://github.com/AstarVienna/ScopeSim.git
          python3.12 -m pip install astar-utils numpy more-itertools astropy PyYAML

          SCOPE_SIM_SITE=$(python3.12 -c "import sysconfig; print(sysconfig.get_paths()['purelib'])")
          echo "PYTHONPATH=$SCOPE_SIM_SITE:$GITHUB_WORKSPACE:${PYTHONPATH:-}" >> $GITHUB_ENV
          python3.12 -c "import scopesim; print(scopesim.__file__)"
          python3.12 -c "import metis_simulations; print(metis_simulations.__file__)"

          if [ -d irdb/.git ]; then
            git -C irdb pull --ff-only
          else
            git clone https://github.com/AstarVienna/irdb.git # get bleeding edge version of irdb
          fi

      - name: Run simulation block [${{ matrix.block }}]
        run: |
          cd "$GITHUB_WORKSPACE"
          export DEFAULT_IRDB_LOCATION="inst_pkgs"
          ln -sfn "$GITHUB_WORKSPACE/irdb" "$GITHUB_WORKSPACE/inst_pkgs"
          
          export MSIM_YAML_DIR="YAML/ESO"
          export MSIM_NCORES=4
          export DEFAULT_IRDB_LOCATION="inst_pkgs"
          export MSIM_OUTDIR="output"

          # Run only the specific block assigned to this matrix job
          ./runESO.sh --only ${{ matrix.block }}

      - name: Upload simulation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ matrix.block }}
          path: output/
          retention-days: 1

  # Finalize job: aggregate results and move data after all blocks complete
  finalize:
    needs: [setup, simulate]
    if: needs.setup.outputs.should_build == '1' && !failure()
    runs-on: [self-hosted, Linux, simulation, zeus]
    steps:
      - uses: actions/checkout@v6

      - name: Download all simulation outputs
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: output-*

      - name: Consolidate simulation results
        run: |
          echo "Consolidating simulation blocks..."
          mkdir -p output
          for dir in artifacts/output-*/; do
            if [ -d "$dir" ]; then
              echo "Merging $dir"
              cp -r "$dir"* output/ 2>/dev/null || true
            fi
          done
          echo "Checking for output data..."
          if [ -d output ] && [ "$(ls -A output)" ]; then
            echo "Output directory populated with $(find output -type d | wc -l) directories"
            ls -la output/ | head -20
          else
            echo "Warning: output directory is empty"
            exit 1
          fi

      - name: Move data to /data
        run: |
          cd "$GITHUB_WORKSPACE/"
          TODAY=$(date +%Y-%m-%d)
          echo "Today's date: $TODAY"
          mkdir -p /data/$TODAY
          cp -a output/. /data/$TODAY/
          cd /data
          chcon -R -t container_file_t -l s0 $TODAY
          ln -sfn $TODAY LatestBuild
          ls -la /data/$TODAY

  # Fallback job: skip message when build is not needed
  skip-build:
    needs: setup
    if: needs.setup.outputs.should_build != '1'
    runs-on: [self-hosted, Linux, simulation, zeus]
    steps:
      - name: Skip rebuild (fresh complete data exists)
        run: |
          echo "Skipping simulation run. Reason: ${{ needs.setup.outputs.build_reason }}"